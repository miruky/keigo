<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="尊敬語・謙譲語の変換ドリルと、二重敬語などの誤用判定で敬語を鍛えるトレーニング"
    />
    <title>keigo - 敬語変換トレーニング</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // 明示的にライト/ダークを選んでいる場合は描画前に適用し、初回フラッシュを防ぐ。
      // 未選択(自動)のときは data-theme を付けず、CSSのprefers-color-schemeに任せる。
      (function () {
        try {
          var t = localStorage.getItem('keigo-theme');
          if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
          <g
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M6 23c4-1 7-4 8-8" />
            <path d="M9 9h14" />
            <path d="M16 5v4" />
            <path d="M22 13c-1 7-5 11-10 13" />
            <path d="M14 15c2 5 6 9 11 10" />
          </g>
        </svg>
        <h1>keigo</h1>
        <p class="tagline">敬語の変換と誤用判定のトレーニング</p>
      </div>
      <div class="header-right">
        <p class="scoreboard" aria-live="off">
          <span id="score-accuracy">正答率 --%</span>
          <span id="score-streak">連続 0</span>
        </p>
        <button
          id="theme-toggle"
          class="icon-button"
          type="button"
          aria-label="配色テーマを切り替える"
        >
          <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4.5" fill="none" stroke="currentColor" stroke-width="1.8" />
            <g stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <path
                d="M12 2.5v2.4M12 19.1v2.4M2.5 12h2.4M19.1 12h2.4M5 5l1.7 1.7M17.3 17.3 19 19M19 5l-1.7 1.7M6.7 17.3 5 19"
              />
            </g>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M20 14.5A8.5 8.5 0 0 1 9.5 4 8.5 8.5 0 1 0 20 14.5Z"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </div>
    </header>

    <div class="meter">
      <div
        class="meter-track"
        role="progressbar"
        aria-label="正答率"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0"
        id="meter"
      >
        <span class="meter-fill" id="meter-fill"></span>
      </div>
    </div>

    <nav class="tabs" role="tablist" aria-label="モード切替">
      <button
        class="tab is-active"
        id="tab-drill"
        role="tab"
        aria-selected="true"
        data-mode="drill"
      >
        変換ドリル
      </button>
      <button class="tab" id="tab-misuse" role="tab" aria-selected="false" data-mode="misuse">
        誤用判定
      </button>
      <button class="tab" id="tab-review" role="tab" aria-selected="false" data-mode="review">
        苦手復習
      </button>
      <button class="tab" id="tab-list" role="tab" aria-selected="false" data-mode="list">
        対照表
      </button>
    </nav>

    <main id="stage" class="app-main"></main>

    <footer class="app-footer">
      <p>
        語形と誤用の判断は文化審議会答申「敬語の指針」の整理に沿っています。成績はこのブラウザにのみ保存されます。
      </p>
      <div class="footer-actions">
        <button id="export-progress" class="link-button" type="button">成績を書き出す</button>
        <button id="reset-progress" class="link-button" type="button">成績をリセット</button>
      </div>
    </footer>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
