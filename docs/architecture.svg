<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 408" role="img" aria-labelledby="t d">
  <title id="t">keigo のアーキテクチャ</title>
  <desc id="d">対照表と誤用例のデータから出題を生成し、成績と苦手リストを localStorage に保ちながら、4モードのUIで出題・採点するまでの流れ。</desc>
  <style>
    svg { --ink: #221e18; --muted: #8d8373; --line: #d6cdbd; --accent: #9a5a2f; }
    @media (prefers-color-scheme: dark) {
      svg { --ink: #efe9e0; --muted: #8a8071; --line: #3a3226; --accent: #d99c66; }
    }
    .box { fill: none; stroke: var(--line); stroke-width: 1; }
    .h { font: 600 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: var(--ink); }
    .mono { font: 600 13px ui-monospace, 'SF Mono', monospace; fill: var(--accent); }
    .s { font: 400 11.5px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: var(--muted); }
    .kicker { font: 600 11px 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      letter-spacing: 0.18em; fill: var(--accent); }
    .flow { stroke: var(--muted); stroke-width: 1.25; fill: none; marker-end: url(#head); }
    .tip { fill: var(--muted); }
  </style>
  <defs>
    <marker id="head" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" class="tip"/>
    </marker>
  </defs>

  <text class="kicker" x="24" y="32">DATA / src/lib/data</text>
  <rect class="box" x="24" y="44" width="352" height="58" rx="10"/>
  <text class="mono" x="44" y="70">verbs.ts</text>
  <text class="s" x="44" y="90">33語の尊敬語・謙譲語対照表(複数語形・補足つき)</text>
  <rect class="box" x="404" y="44" width="352" height="58" rx="10"/>
  <text class="mono" x="424" y="70">misuse.ts</text>
  <text class="s" x="424" y="90">二重敬語・取り違えなど26問の誤用例と言い換え</text>

  <path class="flow" d="M200 102 V138"/>
  <path class="flow" d="M580 102 V138"/>

  <text class="kicker" x="24" y="132">出題 / quiz.ts</text>
  <rect class="box" x="24" y="142" width="352" height="70" rx="10"/>
  <text class="h" x="44" y="168">buildConversionQuestion</text>
  <text class="s" x="44" y="188">別解を誤答に混ぜない選別と反対語形の紛れ。</text>
  <text class="s" x="44" y="204">シード付き乱数で出題列を再現できる</text>
  <rect class="box" x="404" y="142" width="352" height="70" rx="10"/>
  <text class="h" x="424" y="168">buildMisuseQuestion</text>
  <text class="s" x="424" y="188">適切/不適切の判定。解説に言い換えと</text>
  <text class="s" x="424" y="204">根拠(敬語の指針)を添える</text>

  <path class="flow" d="M200 212 V248"/>
  <path class="flow" d="M580 212 V248"/>
  <path class="flow" d="M404 280 H384"/>

  <text class="kicker" x="24" y="242">成績 / progress.ts</text>
  <rect class="box" x="24" y="252" width="352" height="70" rx="10"/>
  <text class="h" x="44" y="278">progress.ts</text>
  <text class="s" x="44" y="298">正答率・連続正解・苦手リストを集計し、</text>
  <text class="s" x="44" y="314">localStorage に版数つきで保存・書き出し</text>
  <rect class="box" x="404" y="252" width="352" height="70" rx="10"/>
  <text class="h" x="424" y="278">苦手復習</text>
  <text class="s" x="424" y="298">間違えた問題idから同じ問題を再構成し、</text>
  <text class="s" x="424" y="314">正解するまで出題対象に残す</text>

  <path class="flow" d="M200 322 V358"/>

  <text class="kicker" x="24" y="352">UI / main.ts</text>
  <rect class="box" x="24" y="362" width="732" height="34" rx="10"/>
  <text class="s" x="44" y="384">4モード切替・キーボード操作・採点フィードバック・進捗メーター・テーマ切替・成績の書き出しとリセット</text>
</svg>
