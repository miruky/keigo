<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" role="img" aria-label="keigoのアーキテクチャ図">
  <title>keigoのアーキテクチャ: 対照表・誤用例データから出題・採点・進捗管理までの流れ</title>
  <style>
    .box { fill: #ffffff; stroke: #d4cec5; rx: 10; }
    .zone { fill: #f1efeb; stroke: #e3ded7; rx: 14; }
    .t { font-family: 'Hiragino Sans','Noto Sans JP',system-ui,sans-serif; fill: #26221d; }
    .h { font-size: 14px; font-weight: 600; }
    .s { font-size: 11px; fill: #6b6258; }
    .zl { font-size: 11px; font-weight: 600; fill: #8a4f2d; letter-spacing: 1px; }
    .arrow { stroke: #6b6258; stroke-width: 1.6; fill: none; marker-end: url(#head); }
    @media (prefers-color-scheme: dark) {
      .box { fill: #211d19; stroke: #453b30; }
      .zone { fill: #1b1814; stroke: #2f2a23; }
      .t { fill: #ece8e3; }
      .s { fill: #a89e93; }
      .zl { fill: #d49a6a; }
      .arrow { stroke: #a89e93; }
    }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L7 4 L0 8 Z" fill="#6b6258"/>
    </marker>
  </defs>

  <rect class="zone" x="20" y="20" width="740" height="96"/>
  <text class="t zl" x="36" y="44">データ(src/lib/data)</text>
  <rect class="box" x="36" y="56" width="340" height="44"/>
  <text class="t h" x="52" y="76">verbs.ts</text>
  <text class="t s" x="52" y="92">25語の尊敬語・謙譲語対照表(複数語形・補足つき)</text>
  <rect class="box" x="400" y="56" width="344" height="44"/>
  <text class="t h" x="416" y="76">misuse.ts</text>
  <text class="t s" x="416" y="92">二重敬語・取り違えなど20問の誤用例と言い換え</text>

  <path class="arrow" d="M206 116 V146"/>
  <path class="arrow" d="M572 116 V146"/>

  <rect class="box" x="36" y="150" width="340" height="64"/>
  <text class="t h" x="52" y="172">buildConversionQuestion(quiz.ts)</text>
  <text class="t s" x="52" y="189">4択生成。別解を誤答に混ぜない選別と</text>
  <text class="t s" x="52" y="204">反対語形の紛れ・シード付き乱数で再現可能</text>
  <rect class="box" x="400" y="150" width="344" height="64"/>
  <text class="t h" x="416" y="172">buildMisuseQuestion(quiz.ts)</text>
  <text class="t s" x="416" y="189">適切/不適切の判定問題。解説に言い換えと</text>
  <text class="t s" x="416" y="204">根拠を添える</text>

  <path class="arrow" d="M206 214 V244"/>
  <path class="arrow" d="M572 214 V244"/>
  <path class="arrow" d="M390 282 H330"/>

  <rect class="box" x="36" y="248" width="340" height="64"/>
  <text class="t h" x="52" y="270">progress.ts</text>
  <text class="t s" x="52" y="287">正答率・連続正解・苦手リストの集計と</text>
  <text class="t s" x="52" y="302">localStorageへの保存(版数つき復元)</text>
  <rect class="box" x="400" y="248" width="344" height="64"/>
  <text class="t h" x="416" y="270">苦手復習</text>
  <text class="t s" x="416" y="287">間違えた問題idから同じ問題を再構成し、</text>
  <text class="t s" x="416" y="302">正解するまで出題対象に残す</text>

  <path class="arrow" d="M206 312 V342"/>

  <rect class="zone" x="20" y="346" width="740" height="36"/>
  <text class="t s" x="36" y="369">UI(main.ts): タブ切替(ドリル/誤用判定/苦手復習/対照表)・採点フィードバック・スコア表示・テーマ切替</text>
</svg>
